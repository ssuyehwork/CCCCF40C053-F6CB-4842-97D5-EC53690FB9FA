<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 13px 16px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
    }

    .header-icon { color: #90caf9; flex-shrink: 0; }
    .header-title { font-size: 14px; font-weight: 600; color: #fff; flex: 1; }

    .status-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .badge-on  { background: #1b3a2e; color: #81c784; border: 1px solid #2e7d52; }
    .badge-off { background: #3e2723; color: #ef9a9a; border: 1px solid #7d3030; }

    .section {
      padding: 11px 16px;
      border-bottom: 1px solid #0f3460;
    }
    .section:last-child { border-bottom: none; }

    .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }

    .row-left { display: flex; align-items: center; gap: 10px; }
    .row-icon { color: #90caf9; flex-shrink: 0; }

    .row-label { display: flex; flex-direction: column; gap: 2px; }
    .row-title { font-size: 13px; font-weight: 500; color: #e0e0e0; }
    .row-desc  { font-size: 11px; color: #666; }

    .toggle { position: relative; width: 38px; height: 21px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: #333; border-radius: 21px;
      cursor: pointer; transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 15px; height: 15px;
      left: 3px; top: 3px;
      background: #666; border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: #1565c0; }
    .toggle input:checked + .toggle-slider::before { transform: translateX(17px); background: #90caf9; }

    #masterToggle:checked + .toggle-slider { background: #1b5e20; }
    #masterToggle:checked + .toggle-slider::before { background: #81c784; }

    .disabled-overlay { opacity: 0.35; pointer-events: none; }
  </style>
</head>
<body>

  <div class="header">
    <!-- 剪贴板图标：代表插件本身的复制功能 -->
    <svg class="header-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
      <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
    </svg>
    <span class="header-title">CopyWithSource</span>
    <span id="statusBadge" class="status-badge badge-on">已启用</span>
  </div>

  <!-- 总开关 -->
  <div class="section">
    <div class="row">
      <div class="row-left">
        <!-- 电源按钮图标：代表开启/关闭整个插件 -->
        <svg class="row-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
        <div class="row-label">
          <span class="row-title">总开关</span>
          <span class="row-desc">关闭后所有功能停止</span>
        </div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="masterToggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div id="featureSection">

    <!-- 弹出复制菜单 -->
    <div class="section">
      <div class="row">
        <div class="row-left">
          <!-- 光标点击弹出菜单图标：鼠标光标 + 小型菜单列表，代表选中后弹出操作菜单 -->
          <svg class="row-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 3l14 9-7 1-4 7-3-17z"/>
            <line x1="15" y1="15" x2="21" y2="15"/>
            <line x1="15" y1="19" x2="21" y2="19"/>
          </svg>
          <div class="row-label">
            <span class="row-title">弹出复制菜单</span>
            <span class="row-desc">选中文字后显示操作按钮</span>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="menuToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- 自动附加来源 -->
    <div class="section">
      <div class="row">
        <div class="row-left">
          <!-- 剪贴板 + 链条图标：代表复制时自动附加链接来源 -->
          <svg class="row-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4h2a2 2 0 0 1 2 2v5"/>
            <path d="M8 4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h5"/>
            <rect x="8" y="2" width="8" height="4" rx="1"/>
            <path d="M13 20a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
            <path d="M18 20a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
            <line x1="16" y1="17" x2="15" y2="17"/>
          </svg>
          <div class="row-label">
            <span class="row-title">自动附加来源</span>
            <span class="row-desc">Ctrl+C 时自动加入链接</span>
          </div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="autoAppendToggle">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
